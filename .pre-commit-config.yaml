repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep in sync with CI (.github/workflows/ci.yml installs `ruff>=0.4`,
    # which currently resolves to 0.15.x). Older pinned versions disagree
    # on `assert ...` line-wrap style and cause CI/local format drift.
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
