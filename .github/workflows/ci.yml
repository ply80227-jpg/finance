name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dev dependencies (no heavy data libs)
        run: |
          python -m pip install --upgrade pip
          pip install pytest>=7 ruff>=0.4
          pip install -e . --no-deps
      - name: Ruff lint
        run: ruff check src tests
      - name: Ruff format check
        run: ruff format --check src tests
      - name: Run tests
        run: pytest
